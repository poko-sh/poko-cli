name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run check

      - name: Build
        run: bun run build

      - name: Verify npm pack excludes sidecars
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.log
          if grep -q 'sidecars' /tmp/pack.log; then
            echo "ERROR: npm pack must not include dist/sidecars/"
            exit 1
          fi
          unpacked=$(grep 'unpacked size:' /tmp/pack.log | awk '{print $3 $4}')
          echo "Unpacked size: $unpacked"
